<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square app background -->
  <rect x="16" y="16" width="480" height="480" rx="104" fill="url(#bg)"/>

  <!-- BPMN process flow (white), laid out as a small diagram:
       start event  ->  task  ->  exclusive gateway  ->  end event -->
  <g fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">

    <!-- Start event: thin circle (top-left) -->
    <circle cx="118" cy="150" r="44"/>

    <!-- connector: start -> task -->
    <path d="M118 194 L118 252 L168 252"/>

    <!-- Task: rounded rectangle (center) -->
    <rect x="168" y="206" width="176" height="92" rx="20"/>

    <!-- connector: task -> gateway -->
    <path d="M344 252 L394 252"/>
  </g>

  <!-- Gateway diamond (separate so the inner X strokes are clean) -->
  <g fill="none" stroke="#ffffff" stroke-width="16" stroke-linejoin="round" stroke-linecap="round">
    <path d="M394 200 L450 252 L394 304 L338 252 Z" transform="translate(0,0)"/>
  </g>
  <g stroke="#ffffff" stroke-width="13" stroke-linecap="round">
    <path d="M381 239 L407 265 M407 239 L381 265"/>
  </g>

  <!-- connector: gateway -> end event (down then to end) -->
  <g fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
    <path d="M394 304 L394 366 L200 366"/>
  </g>

  <!-- End event: thick circle (bottom-left) -->
  <circle cx="156" cy="366" r="46" fill="none" stroke="#ffffff" stroke-width="30"/>

  <!-- arrowheads (filled triangles) -->
  <g fill="#ffffff">
    <!-- into task -->
    <path d="M168 252 l-22 -12 l0 24 z"/>
    <!-- into gateway -->
    <path d="M338 252 l-22 -12 l0 24 z"/>
    <!-- into end event (points left) -->
    <path d="M202 366 l22 -12 l0 24 z"/>
  </g>
</svg>
